<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Smart Health System</title>
    <link rel="stylesheet" href="../style.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
</head>
<body>
<div id="app">
    <section>
        <h2>Hospital Dashboard</h2>
        <button onclick="generateData()">Generate Hospital Data</button>
        <button onclick="generateChart()">View Chart</button>
        <button onclick="exportPDF()">Export PDF Report</button>
        <br><br>
        <h3>Inventory</h3>
        <div style="overflow-x: auto;"><table id="inventoryTable" border="1" style="width:100%; text-align:center;"><thead><tr><th>Item</th><th>Quantity</th><th>Status</th></tr></thead><tbody></tbody></table></div>
        <h3>Patients</h3>
        <div style="overflow-x: auto;"><table id="patientsTable" border="1" style="width:100%; text-align:center;"><thead><tr><th>Name</th><th>Risk Level</th><th>Ward</th></tr></thead><tbody></tbody></table></div>
        <h3>Staff Schedule</h3>
        <div style="overflow-x: auto;"><table id="staffTable" border="1" style="width:100%; text-align:center;"><thead><tr><th>Name</th><th>Role</th><th>Shift</th></tr></thead><tbody></tbody></table></div>
        <canvas id="healthChart" style="max-width:700px; margin:auto; display:block;"></canvas>
    </section>
</div>
<a href="../index.html" onclick="goBackToPortfolio(event)" style="position: fixed; bottom: 30px; right: 30px; padding: 14px 22px; border-radius: 40px; background: linear-gradient(135deg, #E6E6FA, #D8BFD8); color: #4B0082; text-decoration: none; font-weight: 600; box-shadow: 0 6px 18px rgba(0,0,0,0.2); backdrop-filter: blur(10px); transition: 0.3s ease;">Back to Portfolio</a>
<script src="health.js"></script>
<script>
    function goBackToPortfolio(event){
        event.preventDefault();
        window.location.href = "../index.html#projects";
    }
    window.addEventListener('DOMContentLoaded', () => generateData());
</script>
</body>
</html>
